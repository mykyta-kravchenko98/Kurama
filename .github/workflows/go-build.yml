name: Go Build

env:
  AWS_REGION: eu-central-1
  AWS_ACCOUNT_ID: "528081867341"
  IMAGE: kurama

on:
  push:
    branches: [main]
    paths:
      - "cmd/**"
      - "api/**"
      - "internal/**"
      - "config/**"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - ".dockerignore"
      - ".golangci.yml"
      - ".github/workflows/go-build.yml"
  pull_request:
    branches: [main]
    paths:
      - "cmd/**"
      - "api/**"
      - "internal/**"
      - "config/**"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - ".dockerignore"
      - ".golangci.yml"
      - ".github/workflows/go-build.yml"

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      runtime: ${{ steps.filter.outputs.runtime }}
      crd: ${{ steps.filter.outputs.crd }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect runtime and CRD changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            runtime:
              - "cmd/**"
              - "api/**"
              - "internal/**"
              - "go.mod"
              - "go.sum"
              - "Dockerfile"
              - ".dockerignore"
            crd:
              - "config/crd/bases/**"

  build:
    name: Build, lint and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

      - name: Go tests
        run: go test ./... -v

      - name: Build manager (linux/amd64)
        run: GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o /dev/null ./cmd/manager

      - name: Build runner (linux/amd64)
        run: GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o /dev/null ./cmd/runner

  image:
    name: Build and push image
    needs: [changes, build]
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.changes.outputs.runtime == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Exchanges GitHub's short-lived OIDC token for the scoped AWS role;
      # no AWS credentials are stored in repository secrets.
      id-token: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/kurama-gha-ecr-push
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.IMAGE }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.IMAGE }}:latest

  sync-gitops:
    name: Sync CRD and image digest to shorturl-gitops
    needs: [changes, build, image]
    if: >
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.changes.result == 'success' &&
      needs.build.result == 'success' &&
      (needs.changes.outputs.runtime == 'true' || needs.changes.outputs.crd == 'true') &&
      (needs.changes.outputs.runtime != 'true' || needs.image.result == 'success')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Kurama
        uses: actions/checkout@v4

      - name: Sync CRD and image digest
        env:
          GITOPS_TOKEN: ${{ secrets.GITOPS_DEPLOY_TOKEN }}
          NEW_DIGEST: ${{ needs.image.outputs.digest }}
          RUNTIME_CHANGED: ${{ needs.changes.outputs.runtime }}
          CRD_CHANGED: ${{ needs.changes.outputs.crd }}
        run: |
          git clone https://x-access-token:${GITOPS_TOKEN}@github.com/mykyta-kravchenko98/shorturl-gitops.git gitops-repo
          cd gitops-repo

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ "${CRD_CHANGED}" = "true" ]; then
            {
              echo "# Auto-synced by Kurama's CI from config/crd/bases."
              echo "# Do not edit this copy directly."
              cat ../config/crd/bases/traffic.kurama.dev_trafficscenarios.yaml
            } > k8s/kurama/crd.yaml
          fi

          if [ "${RUNTIME_CHANGED}" = "true" ]; then
            if [ -z "${NEW_DIGEST}" ]; then
              echo "image digest is required for a runtime change"
              exit 1
            fi
            sudo curl -sL https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -o /usr/local/bin/yq
            sudo chmod +x /usr/local/bin/yq
            IMAGE_REF="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${IMAGE}@${NEW_DIGEST}"
            export IMAGE_REF
            yq -i '(.spec.template.spec.containers[] | select(.name == "manager").image) = strenv(IMAGE_REF)' \
              k8s/kurama/deployment.yaml
            yq -i '(.spec.template.spec.containers[] | select(.name == "manager").env[] | select(.name == "KURAMA_RUNNER_IMAGE").value) = strenv(IMAGE_REF)' \
              k8s/kurama/deployment.yaml
          fi

          git add k8s/kurama/crd.yaml k8s/kurama/deployment.yaml
          if git diff --cached --quiet; then
            echo "no GitOps change"
            exit 0
          fi

          if [ "${RUNTIME_CHANGED}" = "true" ] && [ "${CRD_CHANGED}" = "true" ]; then
            COMMIT_MESSAGE="chore: sync Kurama CRD and image digest"
          elif [ "${RUNTIME_CHANGED}" = "true" ]; then
            COMMIT_MESSAGE="chore: bump Kurama image digest"
          else
            COMMIT_MESSAGE="chore: sync Kurama CRD"
          fi
          git commit -m "${COMMIT_MESSAGE}"
          for attempt in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            git fetch origin main
            git rebase origin/main
            sleep $(( (RANDOM % 5) + 1 ))
          done
          echo "failed to push GitOps sync after 5 attempts"
          exit 1
