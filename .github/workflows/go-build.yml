name: Go Build

env:
  AWS_REGION: eu-central-1
  AWS_ACCOUNT_ID: "528081867341"
  IMAGE: kurama

on:
  push:
    branches: [main]
    paths:
      - "cmd/**"
      - "api/**"
      - "internal/**"
      - "config/**"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - ".dockerignore"
      - ".golangci.yml"
      - ".github/workflows/go-build.yml"
  pull_request:
    branches: [main]
    paths:
      - "cmd/**"
      - "api/**"
      - "internal/**"
      - "config/**"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - ".dockerignore"
      - ".golangci.yml"
      - ".github/workflows/go-build.yml"

jobs:
  build:
    name: Build, lint and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          # Phase 0 has no external dependencies and therefore no go.sum.
          # Re-enable the dependency cache when controller dependencies are
          # introduced and Go generates that file.
          cache: false

      - name: Go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

      - name: Go tests
        run: go test ./... -v

      - name: Build manager (linux/amd64)
        run: GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o /dev/null ./cmd/manager

  image:
    name: Build and push image
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Exchanges GitHub's short-lived OIDC token for the scoped AWS role;
      # no AWS credentials are stored in repository secrets.
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/kurama-gha-ecr-push
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.IMAGE }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.IMAGE }}:latest
