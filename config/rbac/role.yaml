---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kurama-manager
rules:
  - apiGroups:
      - traffic.kurama.dev
    resources:
      - trafficscenarios
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - traffic.kurama.dev
    resources:
      - trafficscenarios/status
    verbs:
      - get
      - patch
      - update
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - apps
    resources:
      - deployments
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
